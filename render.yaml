services:
  # Cron job：每個交易日台灣時間 14:15 執行選股分析並推播至 LINE
  - type: cron
    name: MultiAgent_Afternoon_Push
    runtime: python
    region: singapore
    plan: free
    branch: main
    schedule: "15 6 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python daily_push.py
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
